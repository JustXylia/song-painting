    function drawBambooShoots(ctx, w, h, p) {
        // 竹笋
        const shoots = [
            { x: 0.35, y: 0.88, size: 12 },
            { x: 0.6, y: 0.9, size: 10 },
        ];
        const count = Math.ceil(shoots.length * p);

        for (let i = 0; i < count; i++) {
            const s = shoots[i];
            const sx = s.x * w, sy = s.y * h;
            ctx.save();

            // 竹笋形状（锥形）
            ctx.beginPath();
            ctx.moveTo(sx, sy - s.size * 2);
            ctx.bezierCurveTo(sx - s.size * 0.5, sy - s.size, sx - s.size * 0.6, sy - s.size * 0.3, sx - s.size * 0.4, sy);
            ctx.lineTo(sx + s.size * 0.4, sy);
            ctx.bezierCurveTo(sx + s.size * 0.6, sy - s.size * 0.3, sx + s.size * 0.5, sy - s.size, sx, sy - s.size * 2);
            ctx.closePath();

            const sGrad = ctx.createLinearGradient(sx, sy - s.size * 2, sx, sy);
            sGrad.addColorStop(0, '#8aaa60');
            sGrad.addColorStop(0.5, '#6a8a40');
            sGrad.addColorStop(1, '#4a6a30');
            ctx.fillStyle = sGrad;
            ctx.fill();
            ctx.strokeStyle = '#3a5a2a';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 竹笋环纹
            for (let r = 0; r < 3; r++) {
                const ry = sy - s.size * 2 + (s.size * 2 / 3) * (r + 0.5);
                ctx.beginPath();
                ctx.ellipse(sx, ry, s.size * (0.3 + r * 0.08), 2, 0, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(40,60,30,0.3)';
                ctx.lineWidth = 0.8;
                ctx.stroke();
            }

            ctx.restore();
        }
    }

    // ==================== 远山流云 ====================
    function renderMountain(ctx, progress, guides) {
        const w = ctx.canvas.width, h = ctx.canvas.height;

        // === 阶段1：远山（progress 0~0.3）===
        if (progress > 0) {
            const p1 = Math.min(1, progress / 0.3);
            drawDistantMountainLayers(ctx, w, h, p1);
        }

        // === 阶段2：中景山体+皴法（progress 0.25~0.5）===
        if (progress > 0.25) {
            const p2 = Math.min(1, (progress - 0.25) / 0.25);
            drawMidMountainLayers(ctx, w, h, p2);
        }

        // === 阶段3：近景+松树（progress 0.45~0.65）===
        if (progress > 0.45) {
            const p3 = Math.min(1, (progress - 0.45) / 0.2);
            drawForegroundAndPines(ctx, w, h, p3);
        }

        // === 阶段4：云雾（progress 0.55~0.75）===
        if (progress > 0.55) {
            const p4 = Math.min(1, (progress - 0.55) / 0.2);
            drawCloudsAndMist(ctx, w, h, p4);
        }

        // === 阶段5：水面+倒影+飞鸟+瀑布（progress 0.7~1.0）===
        if (progress > 0.7) {
            const p5 = Math.min(1, (progress - 0.7) / 0.3);
            drawWaterAndDetails(ctx, w, h, p5);
        }
    }

    function drawDistantMountainLayers(ctx, w, h, p) {
        // 远山 - 多层渐变填充
        const layers = [
            { y: 0.15, color1: 'rgba(140,160,180,0.15)', color2: 'rgba(120,140,160,0.08)', points: [
                [0.05,0.22],[0.12,0.18],[0.2,0.2],[0.28,0.16],[0.35,0.19],[0.4,0.17],
                [0.48,0.14],[0.55,0.16],[0.62,0.13],[0.7,0.15],[0.78,0.12],[0.85,0.14],[0.92,0.11],[0.98,0.15]
            ]},
            { y: 0.22, color1: 'rgba(120,140,130,0.2)', color2: 'rgba(100,120,110,0.1)', points: [
                [0.0,0.28],[0.08,0.22],[0.15,0.25],[0.22,0.2],[0.3,0.23],[0.38,0.21],
                [0.45,0.18],[0.52,0.2],[0.6,0.17],[0.68,0.19],[0.75,0.16],[0.85,0.2],[0.92,0.22],[1.0,0.25]
            ]},
        ];
        const count = Math.ceil(layers.length * p);

        for (let i = 0; i < count; i++) {
            const layer = layers[i];
            ctx.save();

            ctx.beginPath();
            ctx.moveTo(0, layer.y * h);
            layer.points.forEach(pt => ctx.lineTo(pt[0] * w, pt[1] * h));
            ctx.lineTo(w, layer.y * h + 80);
            ctx.lineTo(0, layer.y * h + 80);
            ctx.closePath();

            const mGrad = ctx.createLinearGradient(0, layer.y * h, 0, layer.y * h + 80);
            mGrad.addColorStop(0, layer.color1);
            mGrad.addColorStop(1, layer.color2);
            ctx.fillStyle = mGrad;
            ctx.fill();

            // 山顶雾气
            ctx.beginPath();
            layer.points.forEach((pt, idx) => {
                idx === 0 ? ctx.moveTo(pt[0] * w, pt[1] * h - 5) : ctx.lineTo(pt[0] * w, pt[1] * h - 5);
            });
            ctx.strokeStyle = 'rgba(200,210,220,0.1)';
            ctx.lineWidth = 8;
            ctx.stroke();

            ctx.restore();
        }
    }

    function drawMidMountainLayers(ctx, w, h, p) {
        // 中景山体 + 皴法纹理
        ctx.save();

        // 中景山填充
        const midPoints = [
            [0.0,0.45],[0.06,0.38],[0.12,0.35],[0.2,0.32],[0.28,0.34],[0.35,0.3],
            [0.42,0.33],[0.5,0.28],[0.58,0.31],[0.65,0.27],[0.72,0.3],[0.8,0.26],
            [0.88,0.29],[0.95,0.32],[1.0,0.38]
        ];

        ctx.beginPath();
        ctx.moveTo(0, 0.45 * h);
        midPoints.forEach(pt => ctx.lineTo(pt[0] * w, pt[1] * h));
        ctx.lineTo(w, 0.55 * h);
        ctx.lineTo(0, 0.55 * h);
        ctx.closePath();

        const mGrad = ctx.createLinearGradient(0, 0.25 * h, 0, 0.55 * h);
        mGrad.addColorStop(0, 'rgba(100,120,100,0.25)');
        mGrad.addColorStop(0.5, 'rgba(80,100,80,0.2)');
        mGrad.addColorStop(1, 'rgba(60,80,60,0.15)');
        ctx.fillStyle = mGrad;
        ctx.fill();

        // 皴法纹理（短线条）
        ctx.strokeStyle = 'rgba(50,60,50,0.15)';
        ctx.lineWidth = 1;
        for (let i = 1; i < midPoints.length - 1; i += 1) {
            const px = midPoints[i][0] * w;
            const py = midPoints[i][1] * h;
            for (let k = 0; k < 5; k++) {
                const ox = (Math.random() - 0.5) * 30;
                const oy = Math.random() * 20 + 5;
                ctx.beginPath();
                ctx.moveTo(px + ox, py + oy);
                ctx.lineTo(px + ox + 6 + Math.random() * 8, py + oy - 4 - Math.random() * 8);
                ctx.stroke();
            }
        }

        // 山体轮廓线
        ctx.beginPath();
        midPoints.forEach((pt, idx) => {
            idx === 0 ? ctx.moveTo(pt[0] * w, pt[1] * h) : ctx.lineTo(pt[0] * w, pt[1] * h);
        });
        ctx.strokeStyle = 'rgba(60,80,60,0.3)';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        ctx.restore();
    }

    function drawForegroundAndPines(ctx, w, h, p) {
        // 近景山体
        ctx.save();
        const fgPoints = [
            [0.0,0.6],[0.06,0.55],[0.12,0.52],[0.2,0.5],[0.28,0.53],[0.35,0.48],
            [0.42,0.51],[0.5,0.46],[0.58,0.49],[0.65,0.44],[0.72,0.47],[0.8,0.43],
            [0.88,0.46],[0.95,0.42],[1.0,0.48]
        ];

        ctx.beginPath();
        ctx.moveTo(0, 0.6 * h);
        fgPoints.forEach(pt => ctx.lineTo(pt[0] * w, pt[1] * h));
        ctx.lineTo(w, 0.75 * h);
        ctx.lineTo(0, 0.75 * h);
        ctx.closePath();

        const fgGrad = ctx.createLinearGradient(0, 0.42 * h, 0, 0.75 * h);
        fgGrad.addColorStop(0, 'rgba(80,100,70,0.3)');
        fgGrad.addColorStop(1, 'rgba(60,80,50,0.15)');
        ctx.fillStyle = fgGrad;
        ctx.fill();

        // 松树
        if (p > 0.3) {
            const pp = Math.min(1, (p - 0.3) / 0.7);
            drawPineTree(ctx, w, h, 0.78, 0.42, 0.35, pp);
            if (p > 0.5) {
                drawPineTree(ctx, w, h, 0.18, 0.52, 0.25, Math.min(1, (p - 0.5) / 0.5));
            }
        }

        ctx.restore();
    }

    function drawPineTree(ctx, w, h, x, y, size, p) {
        const tx = x * w, ty = y * h;
        const s = size * Math.min(w, h);

        ctx.save();
        ctx.globalAlpha = p;

        // 树干
        ctx.beginPath();
        ctx.moveTo(tx, ty);
        ctx.bezierCurveTo(tx - s * 0.02, ty + s * 0.3, tx - s * 0.03, ty + s * 0.5, tx - s * 0.02, ty + s * 0.7);
        ctx.lineTo(tx + s * 0.02, ty + s * 0.7);
        ctx.bezierCurveTo(tx + s * 0.03, ty + s * 0.5, tx + s * 0.02, ty + s * 0.3, tx, ty);
        ctx.closePath();
        const trunkGrad = ctx.createLinearGradient(tx - s * 0.03, 0, tx + s * 0.03, 0);
        trunkGrad.addColorStop(0, '#3a2a1a');
        trunkGrad.addColorStop(0.5, '#5a4a3a');
        trunkGrad.addColorStop(1, '#3a2a1a');
        ctx.fillStyle = trunkGrad;
        ctx.fill();

        // 树皮纹理
        ctx.strokeStyle = 'rgba(30,20,10,0.3)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < 5; i++) {
            const ny = ty + s * 0.15 * (i + 1);
            ctx.beginPath();
            ctx.moveTo(tx - s * 0.015, ny);
            ctx.lineTo(tx + s * 0.015, ny + 2);
            ctx.stroke();
        }

        // 针叶层（多层椭圆）
        const foliageLayers = [
            { dy: -0.05, rx: 0.12, ry: 0.06 },
            { dy: 0.05, rx: 0.1, ry: 0.05 },
            { dy: 0.12, rx: 0.08, ry: 0.04 },
            { dy: -0.12, rx: 0.09, ry: 0.04 },
        ];
        foliageLayers.forEach(fl => {
            const fy = ty + fl.dy * s;
            const frx = fl.rx * s;
            const fry = fl.ry * s;
            ctx.beginPath();
            ctx.ellipse(tx, fy, frx, fry, 0, 0, Math.PI * 2);
            const fGrad = ctx.createRadialGradient(tx, fy, 0, tx, fy, frx);
            fGrad.addColorStop(0, 'rgba(30,60,30,0.6)');
            fGrad.addColorStop(0.5, 'rgba(40,70,40,0.4)');
            fGrad.addColorStop(1, 'rgba(50,80,50,0.1)');
            ctx.fillStyle = fGrad;
            ctx.fill();
        });

        ctx.restore();
    }

    function drawCloudsAndMist(ctx, w, h, p) {
        // 云雾 - 多层半透明白色椭圆叠加
        ctx.save();
        const clouds = [
            { x: 0.2, y: 0.25, rx: 80, ry: 20 },
            { x: 0.5, y: 0.2, rx: 100, ry: 18 },
            { x: 0.75, y: 0.28, rx: 70, ry: 15 },
            { x: 0.35, y: 0.35, rx: 90, ry: 22 },
            { x: 0.6, y: 0.32, rx: 85, ry: 16 },
            { x: 0.15, y: 0.4, rx: 60, ry: 12 },
            { x: 0.85, y: 0.35, rx: 65, ry: 14 },
            { x: 0.45, y: 0.45, rx: 75, ry: 18 },
        ];
        const count = Math.ceil(clouds.length * p);

        for (let i = 0; i < count; i++) {
            const c = clouds[i];
            const alpha = 0.06 + Math.random() * 0.04;
            ctx.fillStyle = `rgba(220,225,230,${alpha})`;
            ctx.beginPath();
            ctx.ellipse(c.x * w, c.y * h, c.rx, c.ry, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // 山间雾气
        ctx.fillStyle = 'rgba(230,235,240,0.05)';
        ctx.fillRect(0, 0.3 * h, w, 0.15 * h);

        ctx.restore();
    }

    function drawWaterAndDetails(ctx, w, h, p) {
        // 水面
        ctx.save();
        const waterY = 0.75 * h;
        const waterGrad = ctx.createLinearGradient(0, waterY, 0, h);
        waterGrad.addColorStop(0, 'rgba(150,170,190,0.15)');
        waterGrad.addColorStop(0.3, 'rgba(130,150,170,0.1)');
        waterGrad.addColorStop(1, 'rgba(100,120,140,0.05)');
        ctx.fillStyle = waterGrad;
        ctx.fillRect(0, waterY, w, h - waterY);

        // 水面波纹
        ctx.strokeStyle = 'rgba(150,170,190,0.08)';
        ctx.lineWidth = 1;
        for (let i = 0; i < 8; i++) {
            const wy = waterY + 10 + i * 8;
            ctx.beginPath();
            for (let x = 0; x < w; x += 3) {
                const y = wy + Math.sin(x * 0.03 + i) * 2;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }

        // 水面倒影（模糊的山体倒影）
        if (p > 0.3) {
            ctx.save();
            ctx.globalAlpha = 0.06;
            ctx.translate(0, waterY * 2);
            ctx.scale(1, -1);
            // 简化的倒影山体
            ctx.beginPath();
            ctx.moveTo(0, 0.5 * h);
            ctx.lineTo(0.2 * w, 0.42 * h);
            ctx.lineTo(0.4 * w, 0.48 * h);
            ctx.lineTo(0.6 * w, 0.44 * h);
            ctx.lineTo(0.8 * w, 0.46 * h);
            ctx.lineTo(w, 0.5 * h);
            ctx.lineTo(w, 0.6 * h);
            ctx.lineTo(0, 0.6 * h);
            ctx.closePath();
            ctx.fillStyle = 'rgba(80,100,120,0.3)';
            ctx.fill();
            ctx.restore();
        }

        // 飞鸟（V形）
        if (p > 0.5) {
            const birds = [
                { x: 0.3, y: 0.12, size: 8 },
                { x: 0.35, y: 0.1, size: 6 },
                { x: 0.4, y: 0.13, size: 7 },
                { x: 0.55, y: 0.08, size: 5 },
            ];
            ctx.strokeStyle = 'rgba(40,40,40,0.4)';
            ctx.lineWidth = 1.2;
            ctx.lineCap = 'round';
            birds.forEach(b => {
                const bx = b.x * w, by = b.y * h;
                ctx.beginPath();
                ctx.moveTo(bx - b.size, by + b.size * 0.4);
                ctx.quadraticCurveTo(bx - b.size * 0.3, by - b.size * 0.2, bx, by);
                ctx.quadraticCurveTo(bx + b.size * 0.3, by - b.size * 0.2, bx + b.size, by + b.size * 0.4);
                ctx.stroke();
            });
        }

        // 瀑布/溪流
        if (p > 0.7) {
            const fx = 0.62 * w;
            const fy1 = 0.35 * h;
            const fy2 = 0.75 * h;

            // 瀑布主体
            ctx.save();
            ctx.globalAlpha = 0.15;
            const fallGrad = ctx.createLinearGradient(fx, fy1, fx, fy2);
            fallGrad.addColorStop(0, 'rgba(200,210,220,0.6)');
            fallGrad.addColorStop(0.5, 'rgba(180,200,220,0.4)');
            fallGrad.addColorStop(1, 'rgba(160,180,200,0.2)');
            ctx.strokeStyle = fallGrad;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(fx, fy1);
            ctx.bezierCurveTo(fx - 3, fy1 + (fy2 - fy1) * 0.3, fx + 3, fy1 + (fy2 - fy1) * 0.6, fx, fy2);
            ctx.stroke();

            // 水花
            ctx.globalAlpha = 0.1;
            for (let i = 0; i < 5; i++) {
                const sy = fy2 - 5 + Math.random() * 10;
                const sx = fx + (Math.random() - 0.5) * 15;
                ctx.beginPath();
                ctx.arc(sx, sy, 2 + Math.random() * 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(200,220,240,0.3)';
                ctx.fill();
            }
            ctx.restore();
        }

        ctx.restore();
    }

    // ==================== 辅助函数 ====================
    function bezierPoint(p0, p1, p2, p3, t) {
        const mt = 1 - t;
        return mt * mt * mt * p0 + 3 * mt * mt * t * p1 + 3 * mt * t * t * p2 + t * t * t * p3;
    }

    function drawInkLine(context, pts, color, width, taper) {
        if (pts.length < 2) return;
        context.save();
        context.strokeStyle = color;
        context.lineCap = 'round';
        context.lineJoin = 'round';
        for (let i = 0; i < pts.length - 1; i++) {
            const segWidth = taper ? width * (1 - i / pts.length * 0.4) : width;
            context.lineWidth = segWidth;
            context.beginPath();
            context.moveTo(pts[i][0], pts[i][1]);
            context.lineTo(pts[i + 1][0], pts[i + 1][1]);
            context.stroke();
        }
        context.restore();
    }

    // ============================================================
    //  7. 引导线绘制
    // ============================================================
    function drawGuides() {
        gCtx.clearRect(0,0,w,h);
        const guides = T[currentTheme].guides;
        guides.forEach((g, idx) => {
            const pts = g.pts.map(p => [p[0]*w, p[1]*h]);
            if (pts.length < 2) return;
            const alpha = Math.max(0.1, 1 - tracedMask[idx]);

            gCtx.save();
            gCtx.strokeStyle = `rgba(120,100,80,${alpha})`;
            gCtx.lineWidth = 1.5;
            gCtx.setLineDash([6, 6]);
            gCtx.lineCap = 'round';
            gCtx.lineJoin = 'round';

            if (g.closed || g.style === 'bottom') {
                gCtx.beginPath();
                gCtx.moveTo(pts[0][0],pts[0][1]);
                for(let i=1;i<pts.length;i++) gCtx.lineTo(pts[i][0],pts[i][1]);
                gCtx.closePath();
            } else {
                gCtx.beginPath();
                gCtx.moveTo(pts[0][0],pts[0][1]);
                for(let i=1;i<pts.length;i++) gCtx.lineTo(pts[i][0],pts[i][1]);
            }
            gCtx.stroke();

            if (alpha > 0.3) {
                gCtx.setLineDash([]);
                gCtx.fillStyle = `rgba(196,92,72,${alpha * 0.6})`;
                gCtx.beginPath();
                gCtx.arc(pts[0][0],pts[0][1],4,0,Math.PI*2);
                gCtx.fill();
            }
            gCtx.restore();
        });
    }

    // ============================================================
    //  8. 蒙版系统
    // ============================================================
    function applyRevealMask() {
        if (!completedPaintingData) return;
        rCtx.clearRect(0,0,w,h);
        rCtx.fillStyle = '#faf8f3';
        rCtx.fillRect(0,0,w,h);
        rCtx.putImageData(completedPaintingData,0,0);
        rCtx.globalCompositeOperation = 'destination-in';
        const userData = ctx.getImageData(0,0,w,h);
        const maskData = rCtx.getImageData(0,0,w,h);
        for(let i=3;i<maskData.data.length;i+=4) {
            maskData.data[i] = userData.data[i];
        }
        rCtx.putImageData(maskData,0,0);
        rCtx.globalCompositeOperation = 'source-over';
        drawGuides();
    }

    // ============================================================
    //  9. 追踪用户绘画
    // ============================================================
    function traceUserStroke(x, y) {
        const guides = T[currentTheme].guides;
        let newTraced = 0;
        guides.forEach((g, idx) => {
            if (tracedMask[idx] >= 1) return;
            const pts = g.pts.map(p => [p[0]*w, p[1]*h]);
            let minDist = 999;
            for (let i = 0; i < pts.length - 1; i++) {
                const d = pointToSegDist(x, y, pts[i][0], pts[i][1], pts[i+1][0], pts[i+1][1]);
                if (d < minDist) minDist = d;
            }
            if (g.closed) {
                pts.forEach(p => {
                    const d = Math.sqrt((x-p[0])**2 + (y-p[1])**2);
                    if (d < minDist) minDist = d;
                });
            }
            if (minDist < currentSize * 2 + 15) {
                const segLen = calcPathLen(pts);
                if (tracedMask[idx] < 1) {
                    const old = tracedMask[idx];
                    tracedMask[idx] = Math.min(1, tracedMask[idx] + 0.03);
                    const added = (tracedMask[idx] - old) * segLen;
                    newTraced += added;
                }
            }
        });

        if (newTraced > 0) {
            tracedLength += newTraced;
            const pct = Math.min(100, Math.round(tracedLength / totalGuideLength * 100));
            updateProgress(pct);
            applyRevealMask();
            if (pct >= 100) showHint('🎉 临摹完成！点击"完成"查看画作');
        }
    }

    function pointToSegDist(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const lenSq = dx*dx + dy*dy;
        if (lenSq === 0) return Math.sqrt((px-x1)**2 + (py-y1)**2);
        let t = ((px-x1)*dx + (py-y1)*dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
        const nx = x1 + t*dx, ny = y1 + t*dy;
        return Math.sqrt((px-nx)**2 + (py-ny)**2);
    }

    function calcPathLen(pts) {
        let len = 0;
        for(let i=1;i<pts.length;i++) {
            const dx = pts[i][0]-pts[i-1][0], dy = pts[i][1]-pts[i-1][1];
            len += Math.sqrt(dx*dx+dy*dy);
        }
        return len;
    }

    function updateProgress(pct) {
        progressFill.style.width = pct + '%';
        progressPercent.textContent = pct + '%';
    }

    // ============================================================
    //  10. 绘画事件
    // ============================================================
    function bindEvents() {
        ['mousedown','touchstart'].forEach(e => canvas.addEventListener(e, startD, {passive:false}));
        ['mousemove','touchmove'].forEach(e => canvas.addEventListener(e, drawD, {passive:false}));
        ['mouseup','touchend','mouseout'].forEach(e => canvas.addEventListener(e, stopD));
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        if (e.touches) return {x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top};
        return {x: e.clientX - rect.left, y: e.clientY - rect.top};
    }

    function startD(e) {
        e.preventDefault();
        isDrawing = true;
        const p = getPos(e);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        updateBrushStyle();
    }

    function drawD(e) {
        e.preventDefault();
        if (!isDrawing) return;
        const p = getPos(e);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        traceUserStroke(p.x, p.y);
    }

    function stopD() {
        if (isDrawing) {
            isDrawing = false;
            ctx.closePath();
            saveState();
            applyRevealMask();
        }
    }

    function updateBrushStyle() {
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = currentSize;
        if (currentTool === 'eraser') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.strokeStyle = 'rgba(0,0,0,1)';
        } else {
            ctx.globalCompositeOperation = 'source-over';
            const r = parseInt(currentColor.slice(1,3),16);
            const g = parseInt(currentColor.slice(3,5),16);
            const b = parseInt(currentColor.slice(5,7),16);
            ctx.strokeStyle = `rgba(${r},${g},${b},0.85)`;
        }
    }

    function setColor(c, btn) {
        currentColor = c; currentTool = 'brush'; updateBrushStyle();
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('brushTool').classList.add('active');
        document.getElementById('eraserTool').classList.remove('active');
    }
    function updateBrushSize(v) { currentSize = parseInt(v); document.getElementById('sizeValue').textContent = v; }
    function setTool(t) {
        currentTool = t; updateBrushStyle();
        document.getElementById('brushTool').classList.toggle('active', t==='brush');
        document.getElementById('eraserTool').classList.toggle('active', t==='eraser');
    }

    function saveState() {
        undoIndex++;
        if (undoIndex < undoStack.length) undoStack.length = undoIndex;
        undoStack.push(canvas.toDataURL());
        if (undoStack.length > 20) { undoStack.shift(); undoIndex--; }
    }

    function undo() {
        if (undoIndex > 0) {
            undoIndex--;
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0,0,w,h);
                ctx.drawImage(img,0,0);
                applyRevealMask();
            };
            img.src = undoStack[undoIndex];
            showHint('已撤销');
        } else showHint('没有可撤销的操作');
    }

    function clearCanvas() {
        ctx.clearRect(0,0,w,h);
        tracedMask = T[currentTheme].guides.map(()=>0);
        tracedLength = 0;
        updateProgress(0);
        applyRevealMask();
        saveState();
        showHint('画布已清空');
    }

    // ============================================================
    //  11. 完成画作 - AI生成动画效果
    // ============================================================

    // --- 辅助函数：用户笔画与AI画作的智能融合 ---

    // 检查像素是否在用户笔画的边缘
    function checkEdge(data, x, y, w, h) {
        const idx = (y * w + x) * 4;
        const alpha = data.data[idx + 3];
        const neighbors = [[x-1,y],[x+1,y],[x,y-1],[x,y+1]];
        for (const [nx, ny] of neighbors) {
            if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
            const nIdx = (ny * w + nx) * 4;
            if (Math.abs(data.data[nIdx + 3] - alpha) > 50) return true;
        }
        return false;
    }

    // 计算像素到最近用户笔画的距离（简化版，采样搜索）
    function distToNearestStroke(data, x, y, w, h) {
        const searchRadius = 25;
        const step = 3;
        let minDist = searchRadius;
        for (let dy = -searchRadius; dy <= searchRadius; dy += step) {
            for (let dx = -searchRadius; dx <= searchRadius; dx += step) {
                const nx = x + dx, ny = y + dy;
                if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
                const nIdx = (ny * w + nx) * 4;
                if (data.data[nIdx + 3] > 10) {
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < minDist) minDist = dist;
                }
            }
        }
        return minDist;
    }

    // 添加宣纸纹理
    function addPaperTexture(context) {
        context.save();
        context.globalAlpha = 0.03;
        context.globalCompositeOperation = 'multiply';
        for (let i = 0; i < 2000; i++) {
            const x = Math.random() * w;
            const y = Math.random() * h;
            const size = Math.random() * 2 + 0.5;
            context.fillStyle = Math.random() > 0.5 ? '#8a7a6a' : '#6a5a4a';
            context.fillRect(x, y, size, size);
        }
        context.restore();
    }

    // AI生成动画状态
    let aiAnimating = false;

    function aiGenerate(goToComplete) {
        // AI生成效果，goToComplete为true则跳转到完成页面，false则留在绘画界面
        if (aiAnimating) return;
        aiAnimating = true;

        // 显示墨迹扩散特效覆盖层
        aiOverlay.classList.add('active');
        aiCanvas.width = window.innerWidth;
        aiCanvas.height = window.innerHeight;
        const actx = aiCanvas.getContext('2d');
        const inkText = document.getElementById('inkText');
        inkText.classList.add('show');

        // 强制全部显现蒙版
        tracedMask = T[currentTheme].guides.map(() => 1);
        tracedLength = totalGuideLength;
        updateProgress(100);
        applyRevealMask();

        // 墨迹粒子
        const particles = [];
        const numP = 80;
        const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
        for (let i = 0; i < numP; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * 200;
            particles.push({
                x: cx + Math.cos(angle) * dist,
                y: cy + Math.sin(angle) * dist,
                vx: (Math.random() - 0.5) * 3,
                vy: (Math.random() - 0.5) * 3,
                life: 1,
                size: Math.random() * 12 + 5,
                color: ['#1a1a1a', '#4a4a4a', '#6a5a4a', '#8a7a6a'][Math.floor(Math.random() * 4)]
            });
        }

        // 画布上的墨滴粒子
        const inkDrops = [];

        // 动画参数：总时长约3.5秒（210帧@60fps）
        const totalFrames = 210;
        let frame = 0;

        // 创建临时画布用于逐步绘制
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = w;
        tempCanvas.height = h;
        const tempCtx = tempCanvas.getContext('2d');

        function animateAI() {
            frame++;
            const progress = Math.min(1, frame / totalFrames);

            // === 1. 绘制aiOverlay上的墨迹粒子 ===
            actx.clearRect(0, 0, aiCanvas.width, aiCanvas.height);

            // 深色背景渐变（逐渐变淡）
            const fadeOut = progress > 0.7 ? (1 - (progress - 0.7) / 0.3) : 1;
            const grad = actx.createRadialGradient(cx, cy, 10, cx, cy, 350);
            grad.addColorStop(0, `rgba(245,240,232,${0.05 * fadeOut})`);
            grad.addColorStop(0.4, `rgba(40,35,30,${0.6 * fadeOut})`);
            grad.addColorStop(1, `rgba(10,10,10,${0.95 * fadeOut})`);
            actx.fillStyle = grad;
            actx.fillRect(0, 0, aiCanvas.width, aiCanvas.height);

            // 更新墨迹粒子
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vx *= 0.97;
                p.vy *= 0.97;
                p.life = Math.max(0, p.life - 0.008);

                actx.save();
                actx.globalAlpha = p.life * 0.7 * fadeOut;
                const inkGrad = actx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * p.life);
                inkGrad.addColorStop(0, p.color);
                inkGrad.addColorStop(0.5, 'rgba(80,70,60,0.3)');
                inkGrad.addColorStop(1, 'rgba(0,0,0,0)');
                actx.fillStyle = inkGrad;
                actx.beginPath();
                actx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                actx.fill();
                actx.restore();
            });

            // === 2. 在画布上逐步绘制完整画作 ===
            tempCtx.clearRect(0, 0, w, h);
            tempCtx.fillStyle = '#faf8f3';
            tempCtx.fillRect(0, 0, w, h);
            renderCompletePaintingAnimated(tempCtx, progress);

            // 添加墨滴粒子效果到画布
            if (Math.random() < 0.3 && progress < 0.9) {
                // 根据当前绘制进度确定墨滴位置
                const dropX = Math.random() * w;
                const dropY = Math.random() * h * progress;
                inkDrops.push({
                    x: dropX, y: dropY,
                    size: 1 + Math.random() * 3,
                    life: 1,
                    color: `rgba(30,30,30,${0.2 + Math.random() * 0.3})`
                });
            }

            // 绘制墨滴
            inkDrops.forEach((d, idx) => {
                d.life -= 0.02;
                if (d.life <= 0) return;
                tempCtx.save();
                tempCtx.globalAlpha = d.life;
                tempCtx.fillStyle = d.color;
                tempCtx.beginPath();
                tempCtx.arc(d.x, d.y, d.size * d.life, 0, Math.PI * 2);
                tempCtx.fill();
                tempCtx.restore();
            });

            // 清理已消失的墨滴
            for (let i = inkDrops.length - 1; i >= 0; i--) {
                if (inkDrops[i].life <= 0) inkDrops.splice(i, 1);
            }

            // 更新revealCanvas显示（动画期间用Canvas API高性能混合）
            rCtx.clearRect(0, 0, w, h);
            // 先画AI生成内容
            rCtx.drawImage(tempCanvas, 0, 0);
            // 用'source-atop'模式叠加用户笔画（只影响AI有内容的区域）
            rCtx.globalCompositeOperation = 'source-atop';
            rCtx.globalAlpha = 1 - progress * 0.6; // 用户笔画逐渐被AI覆盖/优化
            rCtx.drawImage(canvas, 0, 0);
            rCtx.globalCompositeOperation = 'source-over';
            rCtx.globalAlpha = 1;

            if (frame < totalFrames) {
                requestAnimationFrame(animateAI);
            } else {
                // 动画完成 - 精确逐像素融合用户画作与AI画作
                setTimeout(() => {
                    aiOverlay.classList.remove('active');
                    inkText.classList.remove('show');
                    aiAnimating = false;

                    // 获取AI生成的完整画作
                    const aiImageData = tempCtx.getImageData(0, 0, w, h);

                    // 将用户画作与AI画作融合
                    const blendCanvas = document.createElement('canvas');
                    blendCanvas.width = w; blendCanvas.height = h;
                    const blendCtx = blendCanvas.getContext('2d');

                    // 先画AI画作作为底
                    blendCtx.putImageData(aiImageData, 0, 0);

                    // 获取用户画布数据
                    const userData = ctx.getImageData(0, 0, w, h);
                    const aiData = aiImageData;

                    // 创建融合后的图像
                    const fusedData = blendCtx.createImageData(w, h);

                    // 逐像素融合
                    for (let y = 0; y < h; y++) {
                        for (let x = 0; x < w; x++) {
                            const idx = (y * w + x) * 4;
                            const uA = userData.data[idx + 3];

                            if (uA > 5) {
                                // 用户画过的区域 - 融合优化
                                const blend = 0.65; // AI优化程度
                                fusedData.data[idx]     = Math.round(userData.data[idx] * (1-blend) + aiData.data[idx] * blend);
                                fusedData.data[idx + 1] = Math.round(userData.data[idx+1] * (1-blend) + aiData.data[idx+1] * blend);
                                fusedData.data[idx + 2] = Math.round(userData.data[idx+2] * (1-blend) + aiData.data[idx+2] * blend);
                                fusedData.data[idx + 3] = Math.max(uA, aiData.data[idx+3]);

                                // 在用户笔画边缘添加AI的细节增强
                                const isEdge = checkEdge(userData, x, y, w, h);
                                if (isEdge) {
                                    fusedData.data[idx]     = Math.min(255, fusedData.data[idx] + Math.round((aiData.data[idx] - fusedData.data[idx]) * 0.4));
                                    fusedData.data[idx + 1] = Math.min(255, fusedData.data[idx+1] + Math.round((aiData.data[idx+1] - fusedData.data[idx+1]) * 0.4));
                                    fusedData.data[idx + 2] = Math.min(255, fusedData.data[idx+2] + Math.round((aiData.data[idx+2] - fusedData.data[idx+2]) * 0.4));
                                }
                            } else {
                                // 用户没画的区域 - 使用AI内容
                                // 但检查是否靠近用户笔画，做渐变过渡
                                const dist = distToNearestStroke(userData, x, y, w, h);
                                if (dist < 25) {
                                    // 靠近用户笔画，AI内容稍微淡化形成过渡
                                    const fade = 0.3 + (dist / 25) * 0.7;
                                    fusedData.data[idx]     = aiData.data[idx];
                                    fusedData.data[idx + 1] = aiData.data[idx+1];
                                    fusedData.data[idx + 2] = aiData.data[idx+2];
                                    fusedData.data[idx + 3] = Math.round(aiData.data[idx+3] * fade);
                                } else {
                                    // 远离用户笔画，直接用AI内容
                                    fusedData.data[idx]     = aiData.data[idx];
                                    fusedData.data[idx + 1] = aiData.data[idx+1];
                                    fusedData.data[idx + 2] = aiData.data[idx+2];
                                    fusedData.data[idx + 3] = aiData.data[idx+3];
                                }
                            }
                        }
                    }

                    blendCtx.putImageData(fusedData, 0, 0);

                    // 添加宣纸纹理叠加
                    addPaperTexture(blendCtx);

                    // 保存融合后的画作
                    completedPaintingData = blendCtx.getImageData(0, 0, w, h);
                    rCtx.putImageData(completedPaintingData, 0, 0);

                    if (goToComplete) {
                        showFinal();
                    } else {
                        showHint('AI已优化你的画作！');
                    }
                }, 400);
            }
        }
        animateAI();
    }

    function completePainting() {
        // 点击"完成"按钮 - 触发AI生成并跳转到完成页面
        aiGenerate(true);
    }

    function showFinal() {
        paintUI.classList.remove('active');
        compScreen.classList.add('active');

        // 直接使用已经融合好的画作
        const combo = document.createElement('canvas');
        combo.width = w; combo.height = h;
        const cctx = combo.getContext('2d');

        // 画背景
        cctx.fillStyle = '#faf8f3';
        cctx.fillRect(0,0,w,h);

        // 画融合后的完整画作
        if (completedPaintingData) {
            cctx.putImageData(completedPaintingData, 0, 0);
        }

        // 叠加用户原始笔画（半透明，保留用户笔触的"手感"）
        cctx.globalAlpha = 0.15;
        cctx.drawImage(canvas, 0, 0);
        cctx.globalAlpha = 1;

        finalImg.src = combo.toDataURL('image/png');
        finalTitle.textContent = T[currentTheme].title;
        finalDesc.textContent = T[currentTheme].desc;
    }

    function downloadPainting() {
        const link = document.createElement('a');
        link.download = `宋画雅趣_${T[currentTheme].title}.png`;
        link.href = finalImg.src;
        link.click();
        showHint('画作已保存');
    }

    function restart() {
        compScreen.classList.remove('active');
        themeSel.classList.add('active');
        undoStack = []; undoIndex = -1;
    }

    function showHint(msg) {
        hint.textContent = msg;
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 2500);
    }
</script>
