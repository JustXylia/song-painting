<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>「宋画雅趣」临摹成画</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink-black: #1a1a1a; --ink-gray: #4a4a4a; --paper-cream: #f5f0e8;
            --paper-warm: #ebe5d9; --vermillion: #c45c48; --vermillion-light: #d97b6a;
            --gold: #b8956a; --gold-light: #d4b896; --jade: #5a8a6e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Noto Serif SC', serif; background: var(--paper-cream);
            color: var(--ink-black); overflow-x: hidden; min-height: 100vh; touch-action: none;
        }
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 1000;
        }

        /* ===== 全局背景Canvas ===== */
        #bgCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        /* ===== 音乐控制 ===== */
        .music-control {
            position: fixed; top: 20px; right: 20px; z-index: 2000;
            width: 44px; height: 44px; border-radius: 50%;
            background: rgba(26,26,26,0.7); border: 1.5px solid var(--gold);
            color: var(--gold); font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s ease; backdrop-filter: blur(4px);
        }
        .music-control:hover { background: var(--gold); color: var(--ink-black); }
        .music-control.playing { animation: musicPulse 2s ease infinite; }
        @keyframes musicPulse { 0%,100%{box-shadow:0 0 0 0 rgba(184,149,106,0.4)} 50%{box-shadow:0 0 0 10px rgba(184,149,106,0)} }

        /* ===== 开场 ===== */
        .intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999; transition: opacity 1.5s ease, visibility 1.5s ease;
        }
        .intro-screen.hidden { opacity: 0; visibility: hidden; }
        .intro-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 3.5rem; color: var(--gold); letter-spacing: 0.6em; margin-bottom: 1rem; opacity: 0; animation: fadeInUp 2s ease forwards; animation-delay: 0.5s; text-shadow: 0 2px 20px rgba(184,149,106,0.3); }
        .intro-subtitle { font-size: 1.1rem; color: var(--gold-light); letter-spacing: 0.4em; margin-bottom: 3rem; opacity: 0; animation: fadeInUp 2s ease forwards; animation-delay: 1.2s; }
        .ink-brush { width: 100px; height: 100px; margin-bottom: 2rem; opacity: 0; animation: brushAppear 2s ease forwards; animation-delay: 0.3s; }
        .ink-brush svg { width: 100%; height: 100%; }
        @keyframes brushAppear { 0% { opacity: 0; transform: rotate(-30deg) scale(0.5); } 100% { opacity: 1; transform: rotate(0deg) scale(1); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .start-btn {
            padding: 16px 55px; font-family: 'Noto Serif SC', serif; font-size: 1.05rem;
            letter-spacing: 0.35em; background: transparent; border: 2px solid var(--gold);
            color: var(--gold); cursor: pointer; transition: all 0.5s ease;
            opacity: 0; animation: fadeInUp 2s ease forwards; animation-delay: 2s;
            position: relative; overflow: hidden;
        }
        .start-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--gold); transition: left 0.5s ease; z-index: -1;
        }
        .start-btn:hover::before { left: 0; }
        .start-btn:hover { color: var(--ink-black); }

        /* ===== 主题选择 ===== */
        .theme-selection { display: none; max-width: 1000px; margin: 0 auto; padding: 40px 20px; min-height: 100vh; position: relative; z-index: 10; }
        .theme-selection.active { display: block; animation: fadeIn 1s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .header { text-align: center; padding: 20px 0 40px; border-bottom: 1px solid rgba(184,149,106,0.3); margin-bottom: 40px; }
        .header h1 { font-family: 'ZCOOL XiaoWei', serif; font-size: 2.2rem; letter-spacing: 0.35em; margin-bottom: 12px; color: var(--ink-black); }
        .header p { color: var(--ink-gray); letter-spacing: 0.25em; font-size: 0.95rem; }
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; margin-bottom: 40px; }
        .theme-card {
            background: linear-gradient(135deg, rgba(245,240,232,0.95) 0%, rgba(235,229,217,0.95) 100%);
            border: 1.5px solid var(--gold-light); border-radius: 10px; padding: 30px 20px;
            cursor: pointer; transition: all 0.4s ease; text-align: center; position: relative; overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .theme-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--vermillion), var(--gold), var(--jade));
            transform: scaleX(0); transition: transform 0.4s ease;
        }
        .theme-card:hover::before { transform: scaleX(1); }
        .theme-card:hover { transform: translateY(-8px); box-shadow: 0 12px 35px rgba(0,0,0,0.12); border-color: var(--gold); }
        .theme-icon { font-size: 2.8rem; margin-bottom: 15px; }
        .theme-card h3 { font-family: 'ZCOOL XiaoWei', serif; font-size: 1.3rem; margin-bottom: 10px; letter-spacing: 0.15em; }
        .theme-card p { font-size: 0.82rem; color: var(--ink-gray); line-height: 1.8; }

        /* ===== 绘画界面 ===== */
        .paint-interface { display: none; min-height: 100vh; position: relative; z-index: 10; }
        .paint-interface.active { display: block; animation: fadeIn 0.5s ease; }
        .paint-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: linear-gradient(135deg, rgba(235,229,217,0.95) 0%, rgba(245,240,232,0.95) 100%);
            border-bottom: 1px solid var(--gold-light); position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(6px);
        }
        .paint-header h2 { font-family: 'ZCOOL XiaoWei', serif; font-size: 1.3rem; letter-spacing: 0.2em; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .header-btn {
            padding: 7px 16px; font-family: 'Noto Serif SC', serif; font-size: 0.8rem;
            background: transparent; border: 1px solid var(--gold-light); color: var(--ink-black);
            cursor: pointer; transition: all 0.3s ease; border-radius: 4px; letter-spacing: 0.1em;
        }
        .header-btn:hover { background: var(--gold); border-color: var(--gold); color: white; }
        .header-btn.primary { background: var(--vermillion); border-color: var(--vermillion); color: white; }
        .header-btn.primary:hover { background: var(--vermillion-light); }
        .header-btn.ai-btn { background: linear-gradient(135deg, var(--gold-light), var(--gold)); border-color: var(--gold); color: var(--ink-black); font-weight: 600; }
        .header-btn.ai-btn:hover { background: linear-gradient(135deg, var(--gold), #a07a4a); color: white; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(184,149,106,0.4); }

        .canvas-area { position: relative; display: flex; justify-content: center; padding: 15px; }
        .canvas-wrapper { position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.15); border-radius: 4px; overflow: hidden; background: #faf8f3; }
        #paintCanvas, #guideCanvas, #revealCanvas { display: block; position: absolute; top: 0; left: 0; cursor: crosshair; }
        #paintCanvas { position: relative; z-index: 10; background: transparent; }
        #revealCanvas { z-index: 5; }
        #guideCanvas { z-index: 8; pointer-events: none; }

        .progress-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 8px 15px; background: rgba(245,240,232,0.9); }
        .progress-track { width: 220px; height: 5px; background: var(--paper-warm); border-radius: 3px; overflow: hidden; border: 1px solid var(--gold-light); }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--vermillion), var(--gold), var(--jade)); width: 0%; transition: width 0.3s ease; border-radius: 3px; }
        .progress-text { font-size: 0.8rem; color: var(--ink-gray); letter-spacing: 0.1em; min-width: 60px; text-align: center; }

        .toolbar {
            display: flex; justify-content: center; gap: 10px; padding: 10px 15px;
            background: linear-gradient(135deg, rgba(235,229,217,0.95) 0%, rgba(245,240,232,0.95) 100%);
            border-top: 1px solid var(--gold-light); position: sticky; bottom: 0; z-index: 100; flex-wrap: wrap;
            backdrop-filter: blur(6px);
        }
        .tool-group { display: flex; align-items: center; gap: 6px; padding: 0 10px; border-right: 1px solid var(--gold-light); }
        .tool-group:last-child { border-right: none; }
        .tool-label { font-size: 0.75rem; color: var(--ink-gray); letter-spacing: 0.1em; white-space: nowrap; }
        .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.3s ease; }
        .color-btn:hover { transform: scale(1.15); }
        .color-btn.active { border-color: var(--ink-black); transform: scale(1.2); }
        .size-slider { width: 70px; -webkit-appearance: none; appearance: none; height: 4px; background: var(--gold-light); border-radius: 2px; outline: none; }
        .size-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 14px; height: 14px; background: var(--vermillion); border-radius: 50%; cursor: pointer; }
        .size-val { font-size: 0.75rem; color: var(--ink-gray); min-width: 20px; text-align: center; }

        /* ===== 完成画面 ===== */
        .completion-screen { display: none; max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: center; position: relative; z-index: 10; }
        .completion-screen.active { display: block; animation: fadeIn 1s ease; }
        .completion-header { margin-bottom: 25px; }
        .completion-header h2 { font-family: 'ZCOOL XiaoWei', serif; font-size: 2.2rem; color: var(--vermillion); letter-spacing: 0.2em; margin-bottom: 10px; }
        .completion-header p { color: var(--ink-gray); letter-spacing: 0.15em; }
        .final-painting { max-width: 600px; margin: 0 auto 25px; border: 12px solid var(--paper-warm); box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; }
        .final-painting::before { content: ''; position: absolute; top: -20px; left: -20px; right: -20px; bottom: -20px; border: 1px solid var(--gold-light); pointer-events: none; }
        .final-painting img { width: 100%; display: block; }
        .painting-info { background: linear-gradient(135deg, rgba(235,229,217,0.95) 0%, rgba(245,240,232,0.95) 100%); border: 1px solid var(--gold-light); border-radius: 8px; padding: 25px; margin-bottom: 25px; text-align: left; backdrop-filter: blur(4px); }
        .painting-info h3 { font-family: 'ZCOOL XiaoWei', serif; font-size: 1.3rem; margin-bottom: 12px; letter-spacing: 0.15em; }
        .painting-info p { line-height: 2; color: var(--ink-gray); font-size: 0.92rem; }
        .action-btns { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .action-btn { padding: 11px 32px; font-family: 'Noto Serif SC', serif; font-size: 0.92rem; letter-spacing: 0.2em; cursor: pointer; transition: all 0.4s ease; border-radius: 4px; }
        .action-btn.primary { background: var(--vermillion); border: none; color: white; }
        .action-btn.primary:hover { background: var(--vermillion-light); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(196,92,72,0.3); }
        .action-btn.secondary { background: transparent; border: 1.5px solid var(--gold); color: var(--ink-black); }
        .action-btn.secondary:hover { background: var(--gold); color: white; }
        .seal { display: inline-block; width: 55px; height: 55px; border: 3px solid var(--vermillion); border-radius: 4px; color: var(--vermillion); font-family: 'ZCOOL XiaoWei', serif; font-size: 0.85rem; line-height: 49px; text-align: center; transform: rotate(-5deg); opacity: 0.8; margin-top: 12px; }

        .hint-toast {
            position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-80px);
            background: var(--ink-black); color: var(--gold); padding: 11px 28px;
            border-radius: 4px; font-size: 0.88rem; letter-spacing: 0.1em;
            z-index: 200; transition: transform 0.4s ease; pointer-events: none;
        }
        .hint-toast.show { transform: translateX(-50%) translateY(0); }

        /* ===== 补全特效覆盖层 ===== */
        .ai-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88); display: none; align-items: center; justify-content: center;
            z-index: 500; flex-direction: column;
        }
        .ai-overlay.active { display: flex; }
        .ai-overlay canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .ink-splash-text { color: var(--gold); font-family: 'ZCOOL XiaoWei', serif; font-size: 1.6rem; letter-spacing: 0.4em; z-index: 1; opacity: 0; }
        .ink-splash-text.show { animation: splashFade 2.5s ease forwards; }
        @keyframes splashFade { 0%{opacity:0;transform:scale(0.9)} 20%{opacity:1;transform:scale(1)} 80%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(1.05)} }

        @media (max-width: 768px) {
            .intro-title { font-size: 2.2rem; letter-spacing: 0.3em; }
            .header h1 { font-size: 1.6rem; }
            .theme-grid { grid-template-columns: 1fr; }
            .toolbar { gap: 6px; padding: 8px; }
            .paint-header { flex-direction: column; gap: 8px; }
            .paint-header h2 { font-size: 1.05rem; }
            .header-btn { padding: 5px 12px; font-size: 0.75rem; }
            .color-btn { width: 24px; height: 24px; }
            .size-slider { width: 50px; }
            .music-control { top: 10px; right: 10px; width: 38px; height: 38px; }
        }
    </style>
</head>
<body>

<!-- 全局动态背景Canvas -->
<canvas id="bgCanvas"></canvas>

<!-- 音乐控制 -->
<button class="music-control" id="musicBtn" onclick="toggleMusic()">🎵</button>

<!-- 开场 -->
<div class="intro-screen" id="introScreen">
    <div class="ink-brush">
        <svg viewBox="0 0 120 120"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8B7355"/><stop offset="100%" stop-color="#5C4A3A"/></linearGradient></defs>
            <rect x="55" y="10" width="10" height="50" rx="2" fill="url(#bg)"/>
            <path d="M55 60 Q60 58 65 60 Q70 75 60 95 Q50 75 55 60" fill="#1a1a1a"/>
            <path d="M58 75 Q60 85 60 95 Q60 85 62 75" fill="#333" opacity="0.5"/>
            <circle cx="60" cy="105" r="4" fill="#1a1a1a" opacity="0.8"/>
        </svg>
    </div>
    <h1 class="intro-title">宋画雅趣</h1>
    <p class="intro-subtitle">临摹成画 · 墨韵渐生</p>
    <button class="start-btn" id="startBtn" style="display:none;">进入画坊</button>
</div>

<!-- 主题选择 -->
<div class="theme-selection" id="themeSelection">
    <div class="header">
        <h1>选择画题</h1>
        <p>沿虚线临摹，画作渐次显现</p>
    </div>
    <div class="theme-grid">
        <div class="theme-card" onclick="selectTheme('plum')">
            <div class="theme-icon">🌺</div>
            <h3>寒梅报春</h3>
            <p>疏影横斜，暗香浮动<br>临摹梅枝，渐成傲雪寒梅</p>
        </div>
        <div class="theme-card" onclick="selectTheme('orchid')">
            <div class="theme-icon">🌿</div>
            <h3>幽兰空谷</h3>
            <p>素心幽芳，清雅绝尘<br>勾勒兰叶，绽放空谷雅韵</p>
        </div>
        <div class="theme-card" onclick="selectTheme('bamboo')">
            <div class="theme-icon">🎋</div>
            <h3>墨竹清风</h3>
            <p>虚心劲节，潇洒临风<br>描摹竹枝，成就君子风骨</p>
        </div>
        <div class="theme-card" onclick="selectTheme('mountain')">
            <div class="theme-icon">⛰️</div>
            <h3>远山流云</h3>
            <p>山色空濛，云水苍茫<br>勾勒山峦，绘就千里江山</p>
        </div>
    </div>
</div>

<!-- 绘画界面 -->
<div class="paint-interface" id="paintInterface">
    <div class="paint-header">
        <h2 id="paintTitle">寒梅报春</h2>
        <div class="header-actions">
            <button class="header-btn" onclick="clearCanvas()">清空</button>
            <button class="header-btn" onclick="undo()">撤销</button>
            <button class="header-btn ai-btn" onclick="aiGenerate(false)">AI生成</button>
            <button class="header-btn primary" onclick="completePainting()">完成</button>
        </div>
    </div>
    <div class="progress-wrap">
        <span class="progress-text">临摹进度</span>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-text" id="progressPercent">0%</span>
    </div>
    <div class="canvas-area">
        <div class="canvas-wrapper">
            <canvas id="paintCanvas"></canvas>
            <canvas id="guideCanvas"></canvas>
            <canvas id="revealCanvas"></canvas>
        </div>
    </div>
    <div class="toolbar">
        <div class="tool-group">
            <span class="tool-label">墨色</span>
            <div class="color-btn active" style="background:#1a1a1a" onclick="setColor('#1a1a1a',this)" title="浓墨"></div>
            <div class="color-btn" style="background:#5a5a5a" onclick="setColor('#5a5a5a',this)" title="淡墨"></div>
            <div class="color-btn" style="background:#c45c48" onclick="setColor('#c45c48',this)" title="朱砂"></div>
            <div class="color-btn" style="background:#5a8a6e" onclick="setColor('#5a8a6e',this)" title="石绿"></div>
            <div class="color-btn" style="background:#4a5d7a" onclick="setColor('#4a5d7a',this)" title="花青"></div>
        </div>
        <div class="tool-group">
            <span class="tool-label">粗细</span>
            <input type="range" class="size-slider" id="brushSize" min="2" max="40" value="6" oninput="updateBrushSize(this.value)">
            <span class="size-val" id="sizeValue">6</span>
        </div>
        <div class="tool-group">
            <button class="tool-btn active" style="width:34px;height:34px;border:1.5px solid var(--gold-light);background:transparent;border-radius:4px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center" id="brushTool" onclick="setTool('brush')">✏️</button>
            <button class="tool-btn" style="width:34px;height:34px;border:1.5px solid var(--gold-light);background:transparent;border-radius:4px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center" id="eraserTool" onclick="setTool('eraser')">🧹</button>
        </div>
    </div>
</div>

<!-- 完成画面 -->
<div class="completion-screen" id="completionScreen">
    <div class="completion-header"><h2>画作完成</h2><p>你的宋画雅趣之作</p></div>
    <div class="final-painting"><img id="finalImage" src="" alt="画作"></div>
    <div class="painting-info"><h3 id="finalTitle">画题</h3><p id="finalDescription">描述</p></div>
    <div class="seal">雅趣</div>
    <div class="action-btns" style="margin-top:25px">
        <button class="action-btn secondary" onclick="downloadPainting()">保存画作</button>
        <button class="action-btn primary" onclick="restart()">再画一幅</button>
    </div>
</div>

<div class="hint-toast" id="hintToast"></div>
<div class="ai-overlay" id="aiOverlay">
    <div class="ink-splash-text" id="inkText">墨韵流转 · 意境渐生</div>
    <canvas id="aiParticleCanvas"></canvas>
</div>

<script>
    // ============================================================
    //  1. 全局动态背景 (水墨粒子 + 飘雪/花瓣 + 山水远景)
    // ============================================================
    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgParticles = [];
    let bgType = 'ink'; // ink | snow | petal | cloud
    let bgFrame = 0;

    function resizeBg() {
        bgCanvas.width = window.innerWidth;
        bgCanvas.height = window.innerHeight;
    }
    resizeBg();
    window.addEventListener('resize', resizeBg);

    function initBgParticles() {
        bgParticles = [];
        const count = window.innerWidth < 768 ? 30 : 60;
        for (let i = 0; i < count; i++) {
            bgParticles.push(createBgParticle());
        }
    }

    function createBgParticle() {
        const w = bgCanvas.width, h = bgCanvas.height;
        if (bgType === 'ink') {
            return {
                x: Math.random() * w, y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 80 + 30, alpha: Math.random() * 0.04 + 0.01,
                life: Math.random() * 200 + 100, type: 'ink'
            };
        } else if (bgType === 'snow') {
            return {
                x: Math.random() * w, y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.5, vy: Math.random() * 0.8 + 0.2,
                size: Math.random() * 3 + 1, alpha: Math.random() * 0.5 + 0.2,
                life: Math.random() * 300 + 100, type: 'snow'
            };
        } else if (bgType === 'petal') {
            return {
                x: Math.random() * w, y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.8 + 0.3, vy: Math.random() * 0.6 + 0.3,
                size: Math.random() * 6 + 3, alpha: Math.random() * 0.4 + 0.15,
                rotation: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.02,
                life: Math.random() * 400 + 150, type: 'petal'
            };
        } else {
            return {
                x: Math.random() * w, y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.1,
                size: Math.random() * 150 + 50, alpha: Math.random() * 0.03 + 0.01,
                life: Math.random() * 300 + 100, type: 'cloud'
            };
        }
    }

    function drawBg() {
        const w = bgCanvas.width, h = bgCanvas.height;
        bgCtx.clearRect(0, 0, w, h);

        // 底色 - 根据场景调整
        if (bgType === 'snow') {
            bgCtx.fillStyle = 'rgba(240,245,250,0.3)';
            bgCtx.fillRect(0, 0, w, h);
        } else if (bgType === 'petal') {
            bgCtx.fillStyle = 'rgba(252,245,248,0.2)';
            bgCtx.fillRect(0, 0, w, h);
        }

        bgParticles.forEach((p, i) => {
            p.x += p.vx;
            p.y += p.vy;
            p.life--;

            if (p.life <= 0 || p.x < -100 || p.x > w + 100 || p.y < -100 || p.y > h + 100) {
                bgParticles[i] = createBgParticle();
                return;
            }

            bgCtx.save();
            bgCtx.globalAlpha = p.alpha * Math.min(1, p.life / 50);

            if (p.type === 'ink') {
                // 水墨晕染效果
                const grad = bgCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                grad.addColorStop(0, 'rgba(80,80,80,0.15)');
                grad.addColorStop(0.5, 'rgba(120,100,80,0.05)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                bgCtx.fillStyle = grad;
                bgCtx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
            } else if (p.type === 'snow') {
                bgCtx.fillStyle = 'rgba(200,210,220,0.8)';
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                bgCtx.fill();
            } else if (p.type === 'petal') {
                p.rotation += p.rotSpeed;
                bgCtx.translate(p.x, p.y);
                bgCtx.rotate(p.rotation);
                bgCtx.fillStyle = `rgba(220,160,170,${p.alpha})`;
                bgCtx.beginPath();
                bgCtx.ellipse(0, 0, p.size, p.size * 0.6, 0, 0, Math.PI * 2);
                bgCtx.fill();
            } else if (p.type === 'cloud') {
                const grad = bgCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                grad.addColorStop(0, 'rgba(180,170,150,0.08)');
                grad.addColorStop(1, 'rgba(0,0,0,0)');
                bgCtx.fillStyle = grad;
                bgCtx.fillRect(p.x - p.size, p.y - p.size, p.size * 2, p.size * 2);
            }
            bgCtx.restore();
        });

        // 远景山峦剪影
        drawDistantMountains();

        bgFrame++;
        requestAnimationFrame(drawBg);
    }

    function drawDistantMountains() {
        const w = bgCanvas.width, h = bgCanvas.height;
        // 远景山
        bgCtx.save();
        bgCtx.globalAlpha = 0.04;
        bgCtx.fillStyle = '#6a7a8a';
        bgCtx.beginPath();
        bgCtx.moveTo(0, h * 0.6);
        for (let x = 0; x <= w; x += 20) {
            const y = h * 0.6 - Math.sin(x * 0.003 + bgFrame * 0.0005) * 40 - Math.sin(x * 0.007) * 20;
            bgCtx.lineTo(x, y);
        }
        bgCtx.lineTo(w, h);
        bgCtx.lineTo(0, h);
        bgCtx.closePath();
        bgCtx.fill();
        bgCtx.restore();

        // 近景山
        bgCtx.save();
        bgCtx.globalAlpha = 0.03;
        bgCtx.fillStyle = '#4a5a6a';
        bgCtx.beginPath();
        bgCtx.moveTo(0, h * 0.75);
        for (let x = 0; x <= w; x += 15) {
            const y = h * 0.75 - Math.sin(x * 0.005 + bgFrame * 0.0003 + 2) * 30 - Math.sin(x * 0.01) * 15;
            bgCtx.lineTo(x, y);
        }
        bgCtx.lineTo(w, h);
        bgCtx.lineTo(0, h);
        bgCtx.closePath();
        bgCtx.fill();
        bgCtx.restore();
    }

    function initAudio() {
        if (!audioCtx) {

    function playGuqinNote(freq, duration) {
        if (!audioCtx) return;
        const now = audioCtx.currentTime;

        // 主音
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);

        // 古琴音色 - 带一点方波谐波
        const osc2 = audioCtx.createOscillator();
        const gain2 = audioCtx.createGain();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(freq * 2, now);
        gain2.gain.setValueAtTime(0.08, now);

        // 滤波器模拟共鸣
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, now);
        filter.frequency.exponentialRampToValueAtTime(400, now + duration / 1000);

        // 包络
        gain.gain.setValueAtTime(0, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.08, now + duration / 1000 * 0.5);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration / 1000);

        osc.connect(filter);
        filter.connect(gain);
        osc2.connect(gain2);
        gain2.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc2.start(now);
        osc.stop(now + duration / 1000 + 0.1);
        osc2.stop(now + duration / 1000 + 0.1);

        // 泛音
        const harm = audioCtx.createOscillator();
        const harmGain = audioCtx.createGain();
        harm.type = 'sine';
        harm.frequency.setValueAtTime(freq * 1.5, now);
        harmGain.gain.setValueAtTime(0, now);
        harmGain.gain.linearRampToValueAtTime(0.03, now + 0.02);
        harmGain.gain.exponentialRampToValueAtTime(0.001, now + duration / 1000 * 0.3);
        harm.connect(harmGain);
        harmGain.connect(audioCtx.destination);
        harm.start(now);
        harm.stop(now + duration / 1000);
    }

    function playNextNote() {
        if (!musicPlaying) return;
        const note = MELODY[currentNote % MELODY.length];
        playGuqinNote(SCALE[note.n], note.d);
        currentNote++;
        musicInterval = setTimeout(playNextNote, note.d);
    }

    function toggleMusic() {
        initAudio();

            btn.classList.add('playing');
            btn.textContent = '🎵';
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playNextNote();
        }
    }

    function initCanvas() {
        canvas = document.getElementById('paintCanvas');

        gCanvas = document.getElementById('guideCanvas');
        gCtx = gCanvas.getContext('2d');
        rCanvas = document.getElementById('revealCanvas');
        rCtx = rCanvas.getContext('2d');

        w = Math.min(window.innerWidth - 40, 800);
        h = Math.min(window.innerHeight - 280, 600);
        [canvas, gCanvas, rCanvas].forEach(c => { c.width = w; c.height = h; });

        totalGuideLength = 0;
        const gs = T[currentTheme].guides;
        tracedMask = gs.map(() => 0);
        gs.forEach(g => {
            let segLen = 0;
            for (let i = 1; i < g.pts.length; i++) {
                const dx = (g.pts[i][0] - g.pts[i-1][0]) * w;
                const dy = (g.pts[i][1] - g.pts[i-1][1]) * h;
                segLen += Math.sqrt(dx*dx + dy*dy);
            }
            totalGuideLength += segLen;
        });
        tracedLength = 0;
        updateProgress(0);

        renderCompletePainting();
        drawGuides();
        ctx.clearRect(0,0,w,h);
        rCtx.fillStyle = '#faf8f3';
        rCtx.fillRect(0,0,w,h);
        rCtx.globalCompositeOperation = 'source-over';

        undoStack = [];
        undoIndex = -1;
        saveState();
        bindEvents();

    function renderCompletePainting() {
        // 生成完整画作（无动画，用于初始化蒙版）
        const oc = document.createElement('canvas');
        oc.width = w; oc.height = h;
        const octx = oc.getContext('2d');

        octx.fillRect(0, 0, w, h);
        paintingSteps = [];
        renderCompletePaintingAnimated(octx, 1.0);
        completedPaintingData = octx.getImageData(0, 0, w, h);
        rCtx.putImageData(completedPaintingData, 0, 0);
        applyRevealMask();
    }

    function renderCompletePaintingAnimated(context, progress) {

            renderOrchid(context, progress, guides);
        } else if (theme === 'bamboo') {
            renderBamboo(context, progress, guides);
        } else if (theme === 'mountain') {
            renderMountain(context, progress, guides);
        }

        context.restore();
    }

    // ==================== 寒梅报春 ====================
    function renderPlum(ctx, progress, guides) {
        const w = ctx.canvas.width, h = ctx.canvas.height;

        // === 阶段1：梅枝（progress 0~0.35）===
        if (progress > 0) {
            const p1 = Math.min(1, progress / 0.35);
            drawPlumBranches(ctx, w, h, p1);
        }

        // === 阶段2：苔点（progress 0.3~0.4）===
        if (progress > 0.3) {
            const p2 = Math.min(1, (progress - 0.3) / 0.1);
            drawMossDots(ctx, w, h, p2);
        }

        // === 阶段3：梅花（progress 0.35~0.7）===
        if (progress > 0.35) {
            const p3 = Math.min(1, (progress - 0.35) / 0.35);
            drawPlumBlossoms(ctx, w, h, p3);
        }

        // === 阶段4：花苞（progress 0.65~0.8）===
        if (progress > 0.65) {
            const p4 = Math.min(1, (progress - 0.65) / 0.15);
            drawPlumBuds(ctx, w, h, p4);
        }

        // === 阶段5：飘落花瓣（progress 0.8~1.0）===
        if (progress > 0.8) {
            const p5 = Math.min(1, (progress - 0.8) / 0.2);
            drawFallingPetals(ctx, w, h, p5);
        }
    }

    function drawPlumBranches(ctx, w, h, p) {
        // 主干 - 多层墨色叠加
        const mainBranch = [
            [0.15, 0.85], [0.18, 0.78], [0.2, 0.7], [0.24, 0.6],
            [0.28, 0.55], [0.34, 0.48], [0.4, 0.45], [0.5, 0.4],
            [0.6, 0.37], [0.7, 0.35], [0.8, 0.33], [0.88, 0.31], [0.92, 0.3]
        ];
        const pts = mainBranch.map(v => [v[0] * w, v[1] * h]);
        const drawCount = Math.ceil(pts.length * p);

        // 底层粗线（深墨）
        if (drawCount >= 2) {
            ctx.save();
            ctx.strokeStyle = '#0a0a0a';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            for (let i = 0; i < drawCount - 1; i++) {
                const t = i / (pts.length - 1);
                const lw = 14 * (1 - t * 0.6);
                ctx.lineWidth = lw;
                ctx.beginPath();
                ctx.moveTo(pts[i][0], pts[i][1]);
                ctx.lineTo(pts[i + 1][0], pts[i + 1][1]);
                ctx.stroke();
            }
            ctx.restore();
        }

        // 中层（中墨）
        if (drawCount >= 2) {
            ctx.save();
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            for (let i = 0; i < drawCount - 1; i++) {
                const t = i / (pts.length - 1);
                const lw = 10 * (1 - t * 0.6);
                ctx.lineWidth = lw;
                ctx.beginPath();
                ctx.moveTo(pts[i][0] - 1, pts[i][1]);
                ctx.lineTo(pts[i + 1][0] - 1, pts[i + 1][1]);
                ctx.stroke();
            }
            ctx.restore();
        }

        // 皴法纹理（树皮短横线）
        if (drawCount >= 3) {
            ctx.save();
            ctx.strokeStyle = 'rgba(60,50,40,0.3)';
            ctx.lineWidth = 1.5;
            for (let i = 1; i < drawCount - 1; i += 1) {
                const t = i / (pts.length - 1);
                const branchWidth = 12 * (1 - t * 0.6);
                const numCun = Math.floor(branchWidth / 3);
                for (let k = 0; k < numCun; k++) {
                    const offset = (k - numCun / 2) * 3;
                    const angle = Math.atan2(pts[i + 1][1] - pts[i][1], pts[i + 1][0] - pts[i][0]) + Math.PI / 2;
                    const cx = pts[i][0] + Math.cos(angle) * offset;
                    const cy = pts[i][1] + Math.sin(angle) * offset;
                    const cunLen = 3 + Math.random() * 4;
                    ctx.beginPath();
                    ctx.moveTo(cx - cunLen / 2, cy);
                    ctx.lineTo(cx + cunLen / 2, cy);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // 分枝1
        if (p > 0.3) {
            const bp1 = Math.min(1, (p - 0.3) / 0.3);
            const branch1 = [[0.28, 0.55], [0.26, 0.48], [0.25, 0.42], [0.23, 0.36], [0.22, 0.32]];
            const b1pts = branch1.map(v => [v[0] * w, v[1] * h]);
            const b1count = Math.ceil(b1pts.length * bp1);
            ctx.save();
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineCap = 'round';
            for (let i = 0; i < b1count - 1; i++) {
                const t = i / (b1pts.length - 1);
                ctx.lineWidth = 7 * (1 - t * 0.5);
                ctx.beginPath();
                ctx.moveTo(b1pts[i][0], b1pts[i][1]);
                ctx.lineTo(b1pts[i + 1][0], b1pts[i + 1][1]);
                ctx.stroke();
            }
            // 皴法
            ctx.strokeStyle = 'rgba(60,50,40,0.25)';
            ctx.lineWidth = 1;
            for (let i = 1; i < b1count - 1; i++) {
                for (let k = 0; k < 2; k++) {
                    const ox = (Math.random() - 0.5) * 6;
                    ctx.beginPath();
                    ctx.moveTo(b1pts[i][0] + ox, b1pts[i][1] - 2);
                    ctx.lineTo(b1pts[i][0] + ox + 3, b1pts[i][1] + 2);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // 分枝2
        if (p > 0.45) {
            const bp2 = Math.min(1, (p - 0.45) / 0.25);
            const branch2 = [[0.55, 0.4], [0.57, 0.34], [0.59, 0.28], [0.61, 0.22], [0.62, 0.18]];
            const b2pts = branch2.map(v => [v[0] * w, v[1] * h]);
            const b2count = Math.ceil(b2pts.length * bp2);
            ctx.save();
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineCap = 'round';
            for (let i = 0; i < b2count - 1; i++) {
                const t = i / (b2pts.length - 1);
                ctx.lineWidth = 6 * (1 - t * 0.5);
                ctx.beginPath();
                ctx.moveTo(b2pts[i][0], b2pts[i][1]);
                ctx.lineTo(b2pts[i + 1][0], b2pts[i + 1][1]);
                ctx.stroke();
            }
            ctx.strokeStyle = 'rgba(60,50,40,0.2)';
            ctx.lineWidth = 1;
            for (let i = 1; i < b2count - 1; i++) {
                for (let k = 0; k < 2; k++) {
                    const ox = (Math.random() - 0.5) * 5;
                    ctx.beginPath();
                    ctx.moveTo(b2pts[i][0] + ox, b2pts[i][1] - 1);
                    ctx.lineTo(b2pts[i][0] + ox + 2, b2pts[i][1] + 2);
                    ctx.stroke();
                }
            }
            ctx.restore();
        }

        // 分枝3
        if (p > 0.6) {
            const bp3 = Math.min(1, (p - 0.6) / 0.25);
            const branch3 = [[0.7, 0.35], [0.73, 0.3], [0.76, 0.24], [0.78, 0.2], [0.79, 0.17]];
            const b3pts = branch3.map(v => [v[0] * w, v[1] * h]);
            const b3count = Math.ceil(b3pts.length * bp3);
            ctx.save();
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineCap = 'round';
            for (let i = 0; i < b3count - 1; i++) {
                const t = i / (b3pts.length - 1);
                ctx.lineWidth = 5 * (1 - t * 0.5);
                ctx.beginPath();
                ctx.moveTo(b3pts[i][0], b3pts[i][1]);
                ctx.lineTo(b3pts[i + 1][0], b3pts[i + 1][1]);
                ctx.stroke();
            }
            ctx.restore();
        }

        // 小分枝
        if (p > 0.75) {
            const bp4 = Math.min(1, (p - 0.75) / 0.25);
            const branch4 = [[0.25, 0.42], [0.26, 0.38], [0.27, 0.36]];
            const b4pts = branch4.map(v => [v[0] * w, v[1] * h]);
            const b4count = Math.ceil(b4pts.length * bp4);
            ctx.save();
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineCap = 'round';
            for (let i = 0; i < b4count - 1; i++) {
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(b4pts[i][0], b4pts[i][1]);
                ctx.lineTo(b4pts[i + 1][0], b4pts[i + 1][1]);
                ctx.stroke();
            }
            ctx.restore();

            const branch5 = [[0.58, 0.28], [0.59, 0.25], [0.6, 0.23]];
            const b5pts = branch5.map(v => [v[0] * w, v[1] * h]);
            const b5count = Math.ceil(b5pts.length * bp4);
            ctx.save();
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineCap = 'round';
            for (let i = 0; i < b5count - 1; i++) {
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(b5pts[i][0], b5pts[i][1]);
                ctx.lineTo(b5pts[i + 1][0], b5pts[i + 1][1]);
                ctx.stroke();
            }
            ctx.restore();
        }
    }

    function drawMossDots(ctx, w, h, p) {
        // 苔点 - 枝干上的小墨点
        ctx.save();
        const dots = [
            [0.22, 0.72], [0.3, 0.52], [0.35, 0.46], [0.45, 0.42],
            [0.55, 0.38], [0.65, 0.36], [0.75, 0.33], [0.82, 0.31],
            [0.26, 0.45], [0.24, 0.38], [0.58, 0.26], [0.72, 0.28]
        ];
        const count = Math.ceil(dots.length * p);
        for (let i = 0; i < count; i++) {
            const d = dots[i];
            const x = d[0] * w, y = d[1] * h;
            const size = 2 + Math.random() * 3;
            ctx.fillStyle = `rgba(20,20,20,${0.4 + Math.random() * 0.3})`;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    function drawPlumBlossoms(ctx, w, h, p) {
        // 梅花 - 5瓣花用贝塞尔曲线
        const blossoms = [
            { x: 0.22, y: 0.30, size: 14, rot: 0.2 },
            { x: 0.62, y: 0.17, size: 13, rot: 0.8 },
            { x: 0.78, y: 0.16, size: 12, rot: 1.5 },
            { x: 0.26, y: 0.36, size: 11, rot: 0.5 },
            { x: 0.59, y: 0.24, size: 10, rot: 1.2 },
            { x: 0.83, y: 0.28, size: 9, rot: 2.0 },
            { x: 0.48, y: 0.38, size: 8, rot: 0.7 },
        ];
        const count = Math.ceil(blossoms.length * p);

        for (let i = 0; i < count; i++) {
            const b = blossoms[i];
            const cx = b.x * w, cy = b.y * h;
            const r = b.size;
            const alpha = Math.min(1, (p * blossoms.length - i) * 2);

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(cx, cy);
            ctx.rotate(b.rot);

            // 5片花瓣（贝塞尔曲线画圆润花瓣）
            for (let j = 0; j < 5; j++) {
                const angle = (j / 5) * Math.PI * 2 - Math.PI / 2;
                const nextAngle = ((j + 1) / 5) * Math.PI * 2 - Math.PI / 2;

                ctx.beginPath();
                ctx.moveTo(0, 0);
                const cp1x = Math.cos(angle + 0.3) * r * 0.8;
                const cp1y = Math.sin(angle + 0.3) * r * 0.8;
                const tipX = Math.cos((angle + nextAngle) / 2) * r;
                const tipY = Math.sin((angle + nextAngle) / 2) * r;
                const cp2x = Math.cos(nextAngle - 0.3) * r * 0.8;
                const cp2y = Math.sin(nextAngle - 0.3) * r * 0.8;

                ctx.bezierCurveTo(cp1x, cp1y, tipX - Math.cos((angle + nextAngle) / 2) * r * 0.1, tipY - Math.sin((angle + nextAngle) / 2) * r * 0.1, tipX, tipY);
                ctx.bezierCurveTo(tipX + Math.cos((angle + nextAngle) / 2) * r * 0.1, tipY + Math.sin((angle + nextAngle) / 2) * r * 0.1, cp2x, cp2y, 0, 0);

                // 花瓣渐变填充
                const petalGrad = ctx.createRadialGradient(0, 0, 0, tipX * 0.5, tipY * 0.5, r);
                petalGrad.addColorStop(0, '#f0e8e0');
                petalGrad.addColorStop(0.4, '#e8c8c0');
                petalGrad.addColorStop(0.7, '#d4a0a0');
                petalGrad.addColorStop(1, '#c08080');
                ctx.fillStyle = petalGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(150,100,90,0.3)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }

            // 花心渐变
            const centerGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, r * 0.35);
            centerGrad.addColorStop(0, '#f5e8c0');
            centerGrad.addColorStop(0.5, '#e8c860');
            centerGrad.addColorStop(1, '#c4a030');
            ctx.fillStyle = centerGrad;
            ctx.beginPath();
            ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2);
            ctx.fill();

            // 花蕊 - 细线+小圆点
            for (let j = 0; j < 7; j++) {
                const angle = (j / 7) * Math.PI * 2 + 0.3;
                const len = r * 0.5 + Math.random() * r * 0.2;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
                ctx.strokeStyle = '#8a6a3a';
                ctx.lineWidth = 0.8;
                ctx.stroke();
                // 花蕊顶端小圆点
                ctx.beginPath();
                ctx.arc(Math.cos(angle) * len, Math.sin(angle) * len, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#d4a030';
                ctx.fill();
            }

            ctx.restore();
        }
    }

    function drawPlumBuds(ctx, w, h, p) {
        // 花苞 - 渐变色小椭圆
        const buds = [
            { x: 0.27, y: 0.34, angle: -0.8, size: 5 },
            { x: 0.6, y: 0.22, angle: -0.5, size: 4 },
            { x: 0.76, y: 0.2, angle: -0.3, size: 4 },
            { x: 0.85, y: 0.3, angle: 0.2, size: 3 },
            { x: 0.4, y: 0.44, angle: -0.6, size: 3 },
        ];
        const count = Math.ceil(buds.length * p);

        for (let i = 0; i < count; i++) {
            const b = buds[i];
            const bx = b.x * w, by = b.y * h;
            ctx.save();
            ctx.translate(bx, by);
            ctx.rotate(b.angle);

            // 花苞渐变
            const budGrad = ctx.createLinearGradient(-b.size, 0, b.size, 0);
            budGrad.addColorStop(0, '#8a5a4a');
            budGrad.addColorStop(0.5, '#c08070');
            budGrad.addColorStop(1, '#d4a090');
            ctx.fillStyle = budGrad;
            ctx.beginPath();
            ctx.ellipse(0, 0, b.size, b.size * 1.8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#6a3a2a';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // 花萼
            ctx.fillStyle = '#3a5a2a';
            ctx.beginPath();
            ctx.ellipse(0, -b.size * 1.5, b.size * 0.6, b.size * 0.8, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }
    }

    function drawFallingPetals(ctx, w, h, p) {
        // 飘落的花瓣
        const petals = [
            { x: 0.35, y: 0.5, size: 5, rot: 0.5, vy: 0.02 },
            { x: 0.5, y: 0.55, size: 4, rot: 1.2, vy: 0.015 },
            { x: 0.65, y: 0.45, size: 6, rot: 2.0, vy: 0.025 },
            { x: 0.75, y: 0.6, size: 4, rot: 0.8, vy: 0.018 },
            { x: 0.4, y: 0.7, size: 5, rot: 1.5, vy: 0.02 },
        ];
        const count = Math.ceil(petals.length * p);

        for (let i = 0; i < count; i++) {
            const pe = petals[i];
            const px = pe.x * w, py = (pe.y + pe.vy * p * 10) * h;
            ctx.save();
            ctx.translate(px, py);
            ctx.rotate(pe.rot + p * 2);
            ctx.globalAlpha = 0.6 * (1 - p * 0.3);

            // 花瓣形状
            ctx.beginPath();
            ctx.ellipse(0, 0, pe.size, pe.size * 0.5, 0, 0, Math.PI * 2);
            const petalGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, pe.size);
            petalGrad.addColorStop(0, '#f0d8d0');
            petalGrad.addColorStop(1, '#d4a0a0');
            ctx.fillStyle = petalGrad;
            ctx.fill();

            ctx.restore();
        }
    }

    // ==================== 幽兰空谷 ====================
    function renderOrchid(ctx, progress, guides) {
        const w = ctx.canvas.width, h = ctx.canvas.height;

        // === 阶段1：兰叶（progress 0~0.4）===
        if (progress > 0) {
            const p1 = Math.min(1, progress / 0.4);
            drawOrchidLeaves(ctx, w, h, p1);
        }

        // === 阶段2：草叶点缀（progress 0.35~0.5）===
        if (progress > 0.35) {
            const p2 = Math.min(1, (progress - 0.35) / 0.15);
            drawGrassAccents(ctx, w, h, p2);
        }

        // === 阶段3：兰花（progress 0.45~0.75）===
        if (progress > 0.45) {
            const p3 = Math.min(1, (progress - 0.45) / 0.3);
            drawOrchidFlowers(ctx, w, h, p3);
        }

        // === 阶段4：露珠（progress 0.75~1.0）===
        if (progress > 0.75) {
            const p4 = Math.min(1, (progress - 0.75) / 0.25);
            drawDewdrops(ctx, w, h, p4);
        }
    }

    function drawOrchidLeaves(ctx, w, h, p) {
        // 兰叶 - 贝塞尔曲线画有弧度的宽叶
        const leaves = [
            { start: [0.3, 0.85], cp1: [0.26, 0.65], cp2: [0.18, 0.45], end: [0.1, 0.28], width: 10, color: '#2a5a2a' },
            { start: [0.35, 0.85], cp1: [0.4, 0.62], cp2: [0.5, 0.45], end: [0.6, 0.25], width: 9, color: '#3a6a3a' },
            { start: [0.32, 0.85], cp1: [0.34, 0.6], cp2: [0.38, 0.38], end: [0.48, 0.18], width: 8, color: '#2a4a2a' },
            { start: [0.28, 0.85], cp1: [0.22, 0.68], cp2: [0.15, 0.55], end: [0.08, 0.45], width: 7, color: '#4a7a4a' },
            { start: [0.37, 0.85], cp1: [0.45, 0.65], cp2: [0.55, 0.5], end: [0.65, 0.4], width: 7, color: '#3a5a3a' },
        ];
        const count = Math.ceil(leaves.length * p);

        for (let i = 0; i < count; i++) {
            const leaf = leaves[i];
            const sx = leaf.start[0] * w, sy = leaf.start[1] * h;
            const c1x = leaf.cp1[0] * w, c1y = leaf.cp1[1] * h;
            const c2x = leaf.cp2[0] * w, c2y = leaf.cp2[1] * h;
            const ex = leaf.end[0] * w, ey = leaf.end[1] * h;

            ctx.save();

            // 叶片主体（宽叶用两条贝塞尔曲线围成）
            const angle = Math.atan2(ey - sy, ex - sx);
            const perpAngle = angle + Math.PI / 2;
            const halfW = leaf.width / 2;

            // 上边缘
            ctx.beginPath();
            ctx.moveTo(sx + Math.cos(perpAngle) * halfW, sy + Math.sin(perpAngle) * halfW);
            ctx.bezierCurveTo(
                c1x + Math.cos(perpAngle) * halfW * 0.8, c1y + Math.sin(perpAngle) * halfW * 0.8,
                c2x + Math.cos(perpAngle) * halfW * 0.3, c2y + Math.sin(perpAngle) * halfW * 0.3,
                ex, ey
            );
            // 下边缘（反向）
            ctx.bezierCurveTo(
                c2x - Math.cos(perpAngle) * halfW * 0.3, c2y - Math.sin(perpAngle) * halfW * 0.3,
                c1x - Math.cos(perpAngle) * halfW * 0.8, c1y - Math.sin(perpAngle) * halfW * 0.8,
                sx - Math.cos(perpAngle) * halfW, sy - Math.sin(perpAngle) * halfW
            );
            ctx.closePath();

            // 叶色渐变（深浅变化）
            const leafGrad = ctx.createLinearGradient(sx, sy, ex, ey);
            leafGrad.addColorStop(0, leaf.color);
            leafGrad.addColorStop(0.5, leaf.color.replace('a', 'b').replace(/[2-4]a/g, m => String(parseInt(m[0]) + 1) + 'a'));
            leafGrad.addColorStop(1, '#1a3a1a');
            ctx.fillStyle = leafGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(20,40,20,0.4)';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // 叶脉（细线）
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.bezierCurveTo(c1x, c1y, c2x, c2y, ex, ey);
            ctx.strokeStyle = 'rgba(20,40,20,0.25)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 侧叶脉
            for (let t = 0.2; t < 0.9; t += 0.15) {
                const bx = bezierPoint(sx, c1x, c2x, ex, t);
                const by = bezierPoint(sy, c1y, c2y, ey, t);
                const ba = Math.atan2(
                    bezierPoint(sy, c1y, c2y, ey, t + 0.01) - by,
                    bezierPoint(sx, c1x, c2x, ex, t + 0.01) - bx
                ) + Math.PI / 2;
                ctx.beginPath();
                ctx.moveTo(bx, by);
                ctx.lineTo(bx + Math.cos(ba) * 6, by + Math.sin(ba) * 6);
                ctx.strokeStyle = 'rgba(20,40,20,0.15)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(bx, by);
                ctx.lineTo(bx - Math.cos(ba) * 6, by - Math.sin(ba) * 6);
                ctx.stroke();
            }

            ctx.restore();
        }
    }

    function drawGrassAccents(ctx, w, h, p) {

    function drawOrchidFlowers(ctx, w, h, p) {
        // 兰花 - 3片花瓣用贝塞尔曲线
        const flowers = [
            { x: 0.12, y: 0.28, size: 16, rot: -0.3 },
            { x: 0.58, y: 0.26, size: 14, rot: 0.2 },
            { x: 0.48, y: 0.18, size: 13, rot: 0.5 },
        ];
        const count = Math.ceil(flowers.length * p);

        for (let i = 0; i < count; i++) {
            const f = flowers[i];
            const fx = f.x * w, fy = f.y * h;
            const alpha = Math.min(1, (p * flowers.length - i) * 2);

            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.translate(fx, fy);
            ctx.rotate(f.rot);

            // 花茎
            ctx.beginPath();
            ctx.moveTo(0, f.size * 1.5);
            ctx.quadraticCurveTo(3, f.size * 0.8, 0, 0);
            ctx.strokeStyle = '#3a5a2a';
            ctx.lineWidth = 2;
            ctx.stroke();

            // 3片主花瓣
            const petalAngles = [-0.8, 0, 0.8];
            for (let j = 0; j < 3; j++) {
                const pa = petalAngles[j];
                ctx.save();
                ctx.rotate(pa);

                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(
                    -f.size * 0.4, -f.size * 0.3,
                    -f.size * 0.2, -f.size * 0.8,
                    0, -f.size
                );
                ctx.bezierCurveTo(
                    f.size * 0.2, -f.size * 0.8,
                    f.size * 0.4, -f.size * 0.3,
                    0, 0
                );

                // 花心渐变
                const fGrad = ctx.createRadialGradient(0, -f.size * 0.4, 0, 0, -f.size * 0.4, f.size * 0.8);
                fGrad.addColorStop(0, '#f8f5f0');
                fGrad.addColorStop(0.3, '#e8e0d0');
                fGrad.addColorStop(0.6, '#d4c8b0');
                fGrad.addColorStop(1, '#b8a890');
                ctx.fillStyle = fGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(80,100,60,0.3)';
                ctx.lineWidth = 0.8;
                ctx.stroke();

                ctx.restore();
            }

            // 花心
            const cGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, f.size * 0.25);
            cGrad.addColorStop(0, '#e8d060');
            cGrad.addColorStop(0.5, '#c4a030');
            cGrad.addColorStop(1, '#8a6a20');
            ctx.fillStyle = cGrad;
            ctx.beginPath();
            ctx.arc(0, 0, f.size * 0.2, 0, Math.PI * 2);
            ctx.fill();

            // 花心斑点
            for (let k = 0; k < 5; k++) {
                const da = (k / 5) * Math.PI * 2;
                ctx.beginPath();
                ctx.arc(Math.cos(da) * f.size * 0.12, Math.sin(da) * f.size * 0.12, 1.2, 0, Math.PI * 2);
                ctx.fillStyle = '#8a4030';
                ctx.fill();
            }

            ctx.restore();
        }
    }

    function drawDewdrops(ctx, w, h, p) {
        // 露珠效果（小圆+高光）
        const drops = [
            { x: 0.22, y: 0.5, size: 4 },

        for (let i = 0; i < count; i++) {
            const d = drops[i];
            const dx = d.x * w, dy = d.y * h;
            ctx.save();

            // 露珠主体
            const dGrad = ctx.createRadialGradient(dx - d.size * 0.3, dy - d.size * 0.3, 0, dx, dy, d.size);
            dGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
            dGrad.addColorStop(0.5, 'rgba(200,220,240,0.5)');

            ctx.fill();

            // 高光
            ctx.fillStyle = 'rgba(255,255,255,0.95)';
            ctx.beginPath();
            ctx.arc(dx - d.size * 0.25, dy - d.size * 0.25, d.size * 0.3, 0, Math.PI * 2);

            ctx.restore();

    // ==================== 墨竹清风 ====================
    function renderBamboo(ctx, progress, guides) {
        const w = ctx.canvas.width, h = ctx.canvas.height;

        // === 阶段1：竹竿（progress 0~0.35）===
        if (progress > 0) {
            const p1 = Math.min(1, progress / 0.35);
            drawBambooStalks(ctx, w, h, p1);
        }

        // === 阶段2：竹叶（progress 0.3~0.7）===
        if (progress > 0.3) {
            const p2 = Math.min(1, (progress - 0.3) / 0.4);
            drawBambooLeaves(ctx, w, h, p2);
        }

        // === 阶段3：地面碎石和小草（progress 0.65~0.85）===
        if (progress > 0.65) {
            const p3 = Math.min(1, (progress - 0.65) / 0.2);
            drawBambooGround(ctx, w, h, p3);
        }

        // === 阶段4：竹笋（progress 0.85~1.0）===
        if (progress > 0.85) {
            const p4 = Math.min(1, (progress - 0.85) / 0.15);
            drawBambooShoots(ctx, w, h, p4);
        }
    }

    function drawBambooStalks(ctx, w, h, p) {
        // 竹竿 - 圆柱感（渐变），竹节明显
        const stalks = [
            { x: 0.25, top: 0.12, bottom: 0.92, width: 14 },
            { x: 0.5, top: 0.25, bottom: 0.94, width: 11 },
            { x: 0.72, top: 0.45, bottom: 0.9, width: 9 },
        ];
        const count = Math.ceil(stalks.length * p);

        for (let i = 0; i < count; i++) {
            const s = stalks[i];
            const sx = s.x * w;
            const sy = s.top * h;
            const ey = s.bottom * h;
            const stalkH = ey - sy;

            ctx.save();

            // 竹竿主体（圆柱感渐变）
            const stalkGrad = ctx.createLinearGradient(sx - s.width / 2, 0, sx + s.width / 2, 0);
            stalkGrad.addColorStop(0, '#2a4a2a');
            stalkGrad.addColorStop(0.3, '#4a7a4a');
            stalkGrad.addColorStop(0.5, '#5a9a5a');
            stalkGrad.addColorStop(0.7, '#4a7a4a');
            stalkGrad.addColorStop(1, '#2a4a2a');
            ctx.fillStyle = stalkGrad;
            ctx.fillRect(sx - s.width / 2, sy, s.width, stalkH);

            // 竹节（双横线+环）
            const numNodes = Math.floor(stalkH / 60);
            for (let n = 1; n <= numNodes; n++) {
                const ny = sy + (stalkH / (numNodes + 1)) * n;

                // 竹节环
                ctx.beginPath();
                ctx.ellipse(sx, ny, s.width / 2 + 2, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#3a6a3a';
                ctx.fill();
                ctx.strokeStyle = '#1a3a1a';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // 双横线
                ctx.beginPath();
                ctx.moveTo(sx - s.width / 2 - 1, ny - 2);
                ctx.lineTo(sx + s.width / 2 + 1, ny - 2);
                ctx.strokeStyle = '#1a3a1a';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(sx - s.width / 2 - 1, ny + 2);
                ctx.lineTo(sx + s.width / 2 + 1, ny + 2);
                ctx.stroke();
            }

            // 高光线
            ctx.beginPath();
            ctx.moveTo(sx - s.width * 0.15, sy);
            ctx.lineTo(sx - s.width * 0.15, ey);
            ctx.strokeStyle = 'rgba(150,200,150,0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.restore();
        }
    }

            { cx: 0.15, cy: 0.35, leaves: [

        ];

        for (let i = 0; i < count; i++) {
            const group = leafGroups[i];
            const gcx = group.cx * w, gcy = group.cy * h;
            const alpha = Math.min(1, (p * leafGroups.length - i) * 1.5);

            ctx.save();
            ctx.globalAlpha = alpha;

            group.leaves.forEach(leaf => {
                ctx.save();
                ctx.translate(gcx, gcy);
                ctx.rotate(leaf.angle);

                // 竹叶形状（贝塞尔曲线）
                ctx.beginPath();
                ctx.moveTo(0, 0);

                    leaf.len * 0.3, -leaf.width / 2,
                    leaf.len * 0.7, -leaf.width / 3,

                );

                    leaf.len * 0.7, leaf.width / 3,

                const lGrad = ctx.createLinearGradient(0, 0, leaf.len, 0);
                lGrad.addColorStop(0, leaf.color);
                lGrad.addColorStop(0.6, leaf.color);
                lGrad.addColorStop(1, leaf.color.replace(/[2-5]a/g, m => String(parseInt(m[0]) + 2) + 'a'));
                ctx.fillStyle = lGrad;
                ctx.fill();

                // 叶脉
                ctx.beginPath();
                ctx.moveTo(2, 0);
                ctx.lineTo(leaf.len - 2, 0);
                ctx.strokeStyle = 'rgba(20,40,20,0.2)';
                ctx.lineWidth = 0.5;
                ctx.stroke();

                ctx.restore();

            ctx.restore();
        }

            { x: 0.55, y: 0.93, rx: 10, ry: 6 },
            { x: 0.75, y: 0.92, rx: 7, ry: 4 },
            { x: 0.9, y: 0.94, rx: 5, ry: 3 },
            { x: 0.45, y: 0.95, rx: 4, ry: 3 },
        ];
        const stoneCount = Math.ceil(stones.length * p);

        for (let i = 0; i < stoneCount; i++) {
            const s = stones[i];
            ctx.beginPath();
            ctx.ellipse(s.x * w, s.y * h, s.rx, s.ry, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,90,80,0.3)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(60,50,40,0.2)';
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        // 小草
        const grasses = [
            { x: 0.15, y: 0.93, angle: -0.3, len: 15 },

            { x: 0.85, y: 0.94, angle: -0.4, len: 10 },
        ];
        const grassCount = Math.ceil(grasses.length * p);
        for (let i = 0; i < grassCount; i++) {
            const g = grasses[i];
            ctx.beginPath();
            ctx.moveTo(g.x * w, g.y * h);
            ctx.quadraticCurveTo(
                (g.x + 0.02) * w, (g.y - 0.02) * h,
                (g.x + 0.03) * w, (g.y - 0.04) * h
            );
